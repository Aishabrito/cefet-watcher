name: Monitoramento CEFET v2
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 👇 NOVO: Restaura o arquivo salvo da execução anterior
      - name: Restaurar conteúdo anterior
        uses: actions/cache@v3
        with:
          path: ./last_content.txt
          key: cefet-content-cache

      - name: Instalar dependências
        run: npm install

      - name: Executar script de monitoramento
        run: npx tsx index.ts
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}

      # 👇 NOVO: Salva o arquivo para a próxima execução
      - name: Salvar conteúdo atual
        uses: actions/cache/save@v3
        with:
          path: ./last_content.txt
          key: cefet-content-cache-${{ github.run_id }}